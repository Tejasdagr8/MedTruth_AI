services:
  - type: web
    name: tejas-medtruth-api
    runtime: python
    plan: free
    region: singapore
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: medtruth_ai
      # Optional: set to "true" if Atlas TLS handshake fails on Render (OCSP / egress).
      - key: MONGO_TLS_DISABLE_OCSP
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
